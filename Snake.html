<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Spiel</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #2c3e50;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            touch-action: manipulation; /* Verhindert Zoom auf Mobile */
        }

        h1 {
            margin-top: 0;
            text-shadow: 2px 2px #000;
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        canvas {
            background-color: #000;
            border: 4px solid #ecf0f1;
            display: block;
        }

        #score-board {
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: bold;
        }

        /* Overlay für Game Over / Start */
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            display: none; /* Standardmäßig ausgeblendet */
        }

        #overlay h2 {
            font-size: 40px;
            margin: 0 0 20px 0;
            color: #e74c3c;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            font-family: inherit;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #2ecc71;
        }

        /* Mobile Controls */
        #mobile-controls {
            margin-top: 20px;
            display: none; /* Nur auf kleinen Screens anzeigen */
            grid-template-columns: 60px 60px 60px;
            gap: 10px;
        }

        .control-btn {
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }
        
        .control-btn:active {
            background: rgba(255,255,255,0.3);
        }

        @media (max-width: 600px) {
            #mobile-controls {
                display: grid;
            }
            canvas {
                max-width: 95vw;
                max-height: 60vh;
            }
        }
    </style>
</head>
<body>

    <h1>SNAKE</h1>
    <div id="score-board">Score: 0</div>

    <div id="game-container">
        <canvas id="board"></canvas>
        <div id="overlay">
            <h2 id="overlay-title">Game Over</h2>
            <p id="final-score">Score: 0</p>
            <button onclick="resetGame()">Neustart</button>
        </div>
    </div>

    <div id="mobile-controls">
        <div></div>
        <div class="control-btn" onclick="changeDirection({code: 'ArrowUp'})">▲</div>
        <div></div>
        <div class="control-btn" onclick="changeDirection({code: 'ArrowLeft'})">◀</div>
        <div class="control-btn" onclick="changeDirection({code: 'ArrowDown'})">▼</div>
        <div class="control-btn" onclick="changeDirection({code: 'ArrowRight'})">▶</div>
    </div>

    <script>
        // --- Konfiguration ---
        const blockSize = 25;
        const rows = 20;
        const cols = 20;
        let board;
        let context;

        // --- Spielvariablen ---
        let snakeX = blockSize * 5;
        let snakeY = blockSize * 5;
        
        let velocityX = 0;
        let velocityY = 0;

        let snakeBody = [];

        let foodX;
        let foodY;

        let score = 0;
        let gameOver = false;
        let gameInterval;

        window.onload = function() {
            board = document.getElementById("board");
            board.height = rows * blockSize;
            board.width = cols * blockSize;
            context = board.getContext("2d");

            placeFood();
            document.addEventListener("keydown", changeDirection);
            
            // Spiel starten
            startGameLoop();
        }

        function startGameLoop() {
            if(gameInterval) clearInterval(gameInterval);
            // Geschwindigkeit: 100ms (je niedriger, desto schneller)
            gameInterval = setInterval(update, 100);
        }

        function update() {
            if (gameOver) {
                return;
            }

            // Hintergrund zeichnen
            context.fillStyle = "black";
            context.fillRect(0, 0, board.width, board.height);

            // Essen zeichnen
            context.fillStyle = "#e74c3c"; // Rot
            context.fillRect(foodX, foodY, blockSize, blockSize);

            // Essen Kollision
            if (snakeX == foodX && snakeY == foodY) {
                snakeBody.push([foodX, foodY]);
                placeFood();
                score += 10;
                document.getElementById("score-board").innerText = "Score: " + score;
            }

            // Körper bewegen (von hinten nach vorne aufrücken)
            for (let i = snakeBody.length - 1; i > 0; i--) {
                snakeBody[i] = snakeBody[i - 1];
            }
            if (snakeBody.length) {
                snakeBody[0] = [snakeX, snakeY];
            }

            // Kopf bewegen
            snakeX += velocityX * blockSize;
            snakeY += velocityY * blockSize;

            // Snake zeichnen
            for (let i = 0; i < snakeBody.length; i++) {
                // Körper ist grün, etwas dunkler
                context.fillStyle = "#27ae60"; 
                context.fillRect(snakeBody[i][0], snakeBody[i][1], blockSize, blockSize);
                
                // Kleiner Rand für Segment-Effekt
                context.strokeStyle = "black";
                context.strokeRect(snakeBody[i][0], snakeBody[i][1], blockSize, blockSize);
            }
            
            // Kopf zeichnen (helleres Grün)
            context.fillStyle = "#2ecc71";
            context.fillRect(snakeX, snakeY, blockSize, blockSize);

            // Game Over Bedingungen
            // 1. Wände
            if (snakeX < 0 || snakeX >= cols * blockSize || snakeY < 0 || snakeY >= rows * blockSize) {
                triggerGameOver();
            }

            // 2. Selbstkollision
            for (let i = 0; i < snakeBody.length; i++) {
                if (snakeX == snakeBody[i][0] && snakeY == snakeBody[i][1]) {
                    triggerGameOver();
                }
            }
        }

        function changeDirection(e) {
            if (gameOver) return;

            if (e.code == "ArrowUp" && velocityY != 1) {
                velocityX = 0;
                velocityY = -1;
            }
            else if (e.code == "ArrowDown" && velocityY != -1) {
                velocityX = 0;
                velocityY = 1;
            }
            else if (e.code == "ArrowLeft" && velocityX != 1) {
                velocityX = -1;
                velocityY = 0;
            }
            else if (e.code == "ArrowRight" && velocityX != -1) {
                velocityX = 1;
                velocityY = 0;
            }
        }

        function placeFood() {
            // Zufällige Position auf dem Raster
            foodX = Math.floor(Math.random() * cols) * blockSize;
            foodY = Math.floor(Math.random() * rows) * blockSize;
        }

        function triggerGameOver() {
            gameOver = true;
            document.getElementById("final-score").innerText = "Score: " + score;
            document.getElementById("overlay").style.display = "flex";
        }

        function resetGame() {
            snakeX = blockSize * 5;
            snakeY = blockSize * 5;
            velocityX = 0;
            velocityY = 0;
            snakeBody = [];
            score = 0;
            gameOver = false;
            
            document.getElementById("score-board").innerText = "Score: 0";
            document.getElementById("overlay").style.display = "none";
            
            placeFood();
        }
    </script>
</body>
</html>
